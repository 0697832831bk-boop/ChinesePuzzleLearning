<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chinese Character Puzzle - HSK Levels</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/main.css">
</head>
<body>

<header class="top-bar">
    <div class="brand-wrap">
        <div class="header-logo" role="img" aria-label="Project logo"></div>
        <h1 class="title">Chinese Character Jigsaw</h1>
    </div>
    <div class="top-actions">
        <span id="user-name" class="user-profile">Learner</span>
        <button id="music-toggle" class="music-btn" aria-label="Toggle music">Music</button>
    </div>
</header>

<section class="menu-container">
    <div class="menu-shell">
        <div class="menu-head">
            <h2>Select Your HSK Level</h2>
            <p>Choose a level to start focused character puzzle practice.</p>
        </div>

        <div class="menu-grid">
            <div class="menu-card" data-level="1">
                <h2>HSK 1</h2>
                <p>50 Characters</p>
            </div>
            <div class="menu-card" data-level="2">
                <h2>HSK 2</h2>
                <p>50 Characters</p>
            </div>
            <div class="menu-card" data-level="3">
                <h2>HSK 3</h2>
                <p>50 Characters</p>
            </div>
            <div class="menu-card" data-level="4">
                <h2>HSK 4</h2>
                <p>50 Characters</p>
            </div>
        </div>
    </div>
</section>

<script src="./js/menu.js"></script>
<script src="./js/music.js"></script>
<script src="./js/index.js"></script>

</body>
</html>
