<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register | Chinese Character Puzzle</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/auth.css">
</head>
<body class="auth-page">
<div class="auth-container">
    <div class="auth-box">
        <div class="auth-card-head">
            <div class="logo-slot">
                <img
                  class="logo-image"
                  src="/assets/logo.png"
                  alt="Chinese Character Jigsaw logo"
                  onerror="this.style.display='none';this.parentElement.classList.add('logo-missing');"
                >
                <span class="logo-fallback" aria-hidden="true">CJL</span>
            </div>
            <p class="auth-kicker">New Learner Setup</p>
            <h1 class="logo-title">Chinese Character Jigsaw</h1>
            <p class="auth-subtitle">Create your account and start practicing characters.</p>
        </div>

        <div class="form-title-block">
            <h2>Register</h2>
            <p>Create a simple account to begin the HSK puzzle activities.</p>
        </div>

        <div class="field-stack">
            <label class="field">
                <span class="field-label">Username</span>
                <input type="text" id="reg-username" placeholder="Choose a username">
            </label>

            <label class="field">
                <span class="field-label">Email</span>
                <input type="email" id="reg-email" placeholder="Enter your email">
            </label>

            <label class="field">
                <span class="field-label">Password</span>
                <input type="password" id="reg-password" placeholder="Create a password">
            </label>
        </div>

        <button id="reg-btn" class="btn-main">Create Account</button>

        <p class="switch-link">
            Already have an account?
            <a href="login.html">Login here</a>
        </p>
    </div>
</div>

<script src="./js/register.js"></script>
</body>
</html>
