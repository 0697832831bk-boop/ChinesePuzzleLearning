<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HSK Game</title>
  <link rel="stylesheet" href="./css/game.css" />
</head>
<body>
  <main class="game-app">
    <section class="panel game-head">
      <div class="brand-wrap">
        <div class="brand-logo" role="img" aria-label="Project logo"></div>
        <div class="header-copy">
          <p class="panel-kicker">Learning Dashboard</p>
          <h1 class="brand-title">Chinese Character Jigsaw</h1>
          <p class="brand-subtitle">Choose a level and load your learning set.</p>
        </div>
      </div>

      <div class="header-actions">
        <p class="session-note">Secure learner session</p>
        <button id="logout-btn" class="logout-btn">Logout</button>
      </div>
    </section>

    <section class="panel level-panel">
      <div class="level-panel-head">
        <div>
          <p class="panel-kicker">HSK Level Selection</p>
          <h2 id="welcome">Welcome!</h2>
        </div>
        <p class="level-intro">Select an HSK level to fetch characters and begin puzzle practice.</p>
      </div>

      <div class="level-actions">
        <button class="level-btn" data-hsk="1">HSK 1</button>
        <button class="level-btn" data-hsk="2">HSK 2</button>
        <button class="level-btn" data-hsk="3">HSK 3</button>
        <button class="level-btn" data-hsk="4">HSK 4</button>
      </div>
    </section>

    <section class="panel status-panel">
      <p class="status-label">Loading and Status</p>
      <div id="chars">Choose a level to load characters.</div>
    </section>
  </main>

  <script src="./js/game.js"></script>
</body>
</html>
