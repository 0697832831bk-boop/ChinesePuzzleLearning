<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HSK Game</title>
  <link rel="stylesheet" href="./css/auth.css" />
</head>
<body>
  <div class="auth-container">
    <h1 class="logo-title">汉字拼图学习</h1>

    <div class="auth-box" style="max-width: 820px;">
      <h2 id="welcome">Welcome!</h2>

      <div style="display:flex; gap:10px; flex-wrap:wrap; margin:12px 0;">
        <button class="btn-main" data-hsk="1">HSK 1</button>
        <button class="btn-main" data-hsk="2">HSK 2</button>
        <button class="btn-main" data-hsk="3">HSK 3</button>
        <button class="btn-main" data-hsk="4">HSK 4</button>
        <button id="logout-btn" class="btn-main" style="margin-left:auto;">Logout</button>
      </div>

      <div id="chars"></div>
    </div>
  </div>

  <script src="./js/game.js"></script>
</body>
</html>
