<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Chinese Character Puzzle</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/auth.css">
</head>
<body class="auth-page">
<div class="auth-container">
    <div class="auth-box">
        <div class="auth-card-head">
            <div class="logo-slot">
                <img
                  class="logo-image"
                  src="/assets/logo.png"
                  alt="Chinese Character Jigsaw logo"
                  onerror="this.style.display='none';this.parentElement.classList.add('logo-missing');"
                >
                <span class="logo-fallback" aria-hidden="true">CJL</span>
            </div>
            <p class="auth-kicker">Learning Access</p>
            <h1 class="logo-title">Chinese Character Jigsaw</h1>
            <p class="auth-subtitle">Sign in to continue your HSK learning session.</p>
        </div>

        <div class="form-title-block">
            <h2>Login</h2>
            <p>Continue with your learner account.</p>
        </div>

        <div class="field-stack">
            <label class="field">
                <span class="field-label">Email</span>
                <input type="email" id="login-email" placeholder="Enter your email">
            </label>

            <label class="field">
                <span class="field-label">Password</span>
                <input type="password" id="login-password" placeholder="Enter your password">
            </label>
        </div>

        <button id="login-btn" class="btn-main">Login</button>

        <p class="switch-link">
            No account?
            <a href="register.html">Register here</a>
        </p>
    </div>
</div>

<script src="./js/login.js"></script>

<audio id="bgMusic" src="./audio/study.mp3" autoplay loop></audio>
<script>
  const audio = document.getElementById("bgMusic");
  audio.volume = 0.2;
</script>

</body>
</html>
